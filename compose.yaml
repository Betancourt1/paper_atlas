name: paper-atlas

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: paper_atlas
      POSTGRES_PASSWORD: paper_atlas_local
      POSTGRES_USER: paper_atlas
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paper_atlas -d paper_atlas"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.29.1
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_PWD: paper_atlas_local
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: paper_atlas
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:2.34.0
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_PASSWORD: paper_atlas_local
      MINIO_ROOT_USER: paper_atlas
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  grobid:
    image: lfoppiano/grobid:0.8.2
    platform: linux/amd64
    entrypoint: ["/tini", "--"]
    command: ["./grobid-service/bin/grobid-service"]
    ports:
      - "8070:8070"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8070'"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  minio-data:
  postgres-data:
